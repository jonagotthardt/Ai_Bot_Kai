# Kai 2.0 configuration.
#
# Kai 2.0's behaviour (combat timing, goal priorities, movement) is currently
# tuned in code (BotCombatManager / BotGoalPlanner / NMSBot). This file is
# reserved for future live-tunable settings; the control loop runs every tick
# for player-like responsiveness.

bot:
  # Display name of the FakePlayer Kai drives. Must be a valid player name.
  name: "Kai"

  # Auto-join: spawn Kai by himself once the server has fully started, without
  # needing a manual /kai spawn. He appears at his last saved position (or the
  # main world spawn on first run). Set to false to require manual spawning.
  auto_spawn: true
  # Delay (server ticks) after enable before the auto-spawn fires, so the world
  # and the FakePlayer backend are fully ready. 20 ticks = 1 second.
  auto_spawn_delay_ticks: 100

  combat:
    # Master switch for the combat brain.
    enabled: true
    # Adaptive per-opponent tactic bandit (Feature A).
    adaptive: true
    # Predictive shield timing learned from the opponent's combo rhythm (Feature C.3).
    combo_defense: true

  shop:
    # Master switch for autonomous gear/consumable acquisition. When off, Kai only
    # equips/enchants from whatever is already in its inventory (no buying).
    enabled: true
    # Command Kai runs (as itself) to buy. {item} = Material name, {amount} = count.
    # Adjust this to match your shop plugin's syntax — no recompile needed.
    buy_command: "shopbuy {item} {amount}"
    # Enchanting via the server command (legit, costs the bot resources) instead of
    # applying enchants directly. {item} = Material name of the piece to enchant.
    use_enchant_command: true
    enchant_command: "enchant {item}"
    # Minimum stock Kai keeps topped up (buys when below). 0 disables that item.
    keep_golden_apples: 16
    keep_food: 32
    keep_totems: 2
    keep_xp_bottles: 64
    keep_building_blocks: 64
    # Material used for speed-bridging over gaps/cliffs to avoid knockback/fall deaths.
    building_block_item: "COBBLESTONE"
    # Ender pearls are planned for later; off by default.
    buy_ender_pearls: false
    keep_ender_pearls: 16

  building:
    # Autonomous, non-combat block placement (auto-torch / auto-fill-hole / auto-bridge
    # while idle or exploring). Off by default: Kai is a PvP entity and should not place
    # blocks on its own unless you opt in. Survival MLG and emergency burrow are separate.
    auto_assist: false
